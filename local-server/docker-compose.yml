# ===============================================
# MESA POS RD - Servidor Local
# Sistema POS para Restaurantes
# ===============================================

version: '3.8'

services:
  # Base de datos MongoDB
  mongodb:
    image: mongo:6.0
    container_name: pos_mongodb
    restart: unless-stopped
    volumes:
      - pos_mongo_data:/data/db
      - ./backups:/backups
    networks:
      - pos_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pos_backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=pos_db
      - JWT_SECRET=mesa_pos_rd_secreto_local_2024_cambiar_en_produccion
      - CORS_ORIGINS=*
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - pos_network

  # Frontend (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=http://localhost:8001
    container_name: pos_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pos_network

networks:
  pos_network:
    driver: bridge

volumes:
  pos_mongo_data:
    driver: local
